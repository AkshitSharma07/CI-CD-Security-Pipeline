name: Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # manual trigger

jobs:

  # ───────────── SAST ─────────────
  sast-bandit:
    name: SAST Scan (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -ll --exit-zero

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ───────────── DEPENDENCY SCAN ─────────────
  dependency-check:
    name: Dependency Scan (Safety)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety Scan
        run: |
          safety check -r requirements.txt --output text || true
          safety check -r requirements.txt --save-json safety-report.json || true

      - name: Upload Safety Report
        uses: actions/upload-artifact@v4   
        with:
          name: safety-report
          path: safety-report.json

  # ───────────── SECRETS SCAN ─────────────
  secrets-scan:
    name: Secrets Scan (TruffleHog)
    runs-on: ubuntu-latest
    continue-on-error: true   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug

  # ───────────── SUMMARY ─────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-bandit, dependency-check, secrets-scan]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "============================================="
          echo "         SECURITY PIPELINE SUMMARY"
          echo "============================================="
          echo "SAST Scan:        ${{ needs.sast-bandit.result }}"
          echo "Dependency Scan:  ${{ needs.dependency-check.result }}"
          echo "Secrets Scan:     ${{ needs.secrets-scan.result }}"
          echo "============================================="
